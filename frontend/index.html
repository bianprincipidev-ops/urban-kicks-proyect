<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Kicks - Tienda Oficial</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Urban Kicks</h1>
    <div id="productos" class="grid-productos">
        <!-- Los productos se cargarán aquí dinámicamente -->
    </div>

    <script>
        // script que le pide las zapatillas al servidor de node.js
        fetch('/api/productos')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('productos');
                data.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <img src="${p.image_url || 'https://via.placeholder.com/150'}" alt="${p.name}">
                            <h3>${p.name}</h3>
                            <p>${p.description}</p>
                            <p class="precio">$${p.price}</p>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
