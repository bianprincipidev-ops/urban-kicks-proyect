<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>PANEL DE CONTROL</h1>
    </header>

    <div class="form-container">
        <h3>Cargar Nueva Zapatilla</h3>
        <form id="productForm">
            <input type="text" id="name" placeholder="Nombre del Modelo" required>
            <textarea id="description" placeholder="Descripción (talles, colores, etc.)" rows="4"></textarea>
            <input type="number" id="price" placeholder="Precio ($)" required>
            <input type="number" id="category_id" placeholder="ID de Categoría" required>

            <label style="display:block; margin-top: 10px;">Foto del Producto:</label>
            <input type="file" id="imagen" accept="image/*" required>

            <button type="submit" class="btn-cargar">SUBIR A LA TIENDA</button>
        </form>
    </div>

    <script>
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData  = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('imagen', document.getElementById('imagen').files[0]);

            const res = await fetch('/api/productos/nuevo', {
                method: 'POST',
                body: formData
            });

            if(res.ok) {
                alert("¡Zapatilla cargada con 'exito!");
                window.location.href = 'index.html'; // Redirige a la página principal
            } else {
                alert("Hubo un error al subir el producto.");
            }
        });
    </script>

    <div class="form-container">
        <h3>Cargar Nueva Promoción</h3>
        <form id="form-promo">
            <input type="text" id="promo-title" placeholder="Título (Ej: 6 Cuotas sin Interés) required">
            <textarea id="promo-subtitle" placeholder="Subtítulo (Ej: Con Naranja X)"></textarea>
            <input type="file" id="promo-image" accept="image/*" required>
            <button type="submit" class="btn-cargar">SUBIR PROMOCIÓN</button>
        </form>
    </div>

    <script> 
        // Logica corregida para enviar la promo al servidor
        document.getElementById('form-promo').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. FormData CON "F" MAYÚSCULA
            const formData = new FormData(); 
            
            formData.append('title', document.getElementById('promo-title').value);
            formData.append('subtitle', document.getElementById('promo-subtitle').value);
            
            // 2. Asegurate que diga 'imagen' para que Multer lo encuentre en el backend
            formData.append('imagen', document.getElementById('promo-image').files[0]);

            try {
                const res = await fetch('/api/promociones/nuevo', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    alert("¡Promoción cargada con éxito!");
                    window.location.href = 'index.html'; 
                } else {
                    // Si llega acá, es porque la ruta existe pero algo falló en el proceso
                    alert("Hubo un error en el servidor al subir la promoción.");
                }
            } catch (error) {
                console.error("Error de red:", error);
                alert("No se pudo conectar con el servidor.");
            }
        });
    </script>

</body>
</html>
