<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto | Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo-urban.png" alt="Urban Kicks Logo">
        </div>
        <nav class="nav-links">
            <a href="/tienda">← Volver a la Tienda</a>
        </nav>
    </header>

    <main class="product-detail-container">
        <div class="product-image">
            <img id="img-producto" src="" alt="Cargando...">
        </div>
        
        <div class="product-info">
            <h1 id="nombre-producto">Cargando...</h1>
            <span class="product-price" id="precio-producto">$0.00</span>
            <p class="product-description" id="descripcion-producto"></p>
            
            <div class="size-selector">
                <span>Seleccionar Talle:</span>
                <div class="size-options" id="contenedor-talles">
                    <p style="color: #888;">Cargando talles...</p>
                </div>
            </div>

            <button class="btn-add-to-cart" onclick="agregarAlCarrito()">AÑADIR AL CARRITO</button>
        </div>
    </main>

    <script>
        let productoActual = null;
        let talleSeleccionado = null; // Para guardar el talle que elija el usuario

        window.onload = async () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return window.location.href = '/tienda';

            try {
                const res = await fetch(`/api/productos/${id}`);
                const prod = await res.json();
                
                if (res.ok) {
                    productoActual = prod;
                    document.getElementById('nombre-producto').innerText = prod.name;
                    document.getElementById('precio-producto').innerText = `$${Number(prod.price).toLocaleString('es-AR')}`;
                    document.getElementById('img-producto').src = prod.image_url;
                    document.getElementById('descripcion-producto').innerText = prod.description || 'Sin descripción.';

                    // --- RENDERIZAR TALLES DESDE LA DB ---
                    const contenedorTalles = document.getElementById('contenedor-talles');
                    if (prod.sizes && prod.sizes.length > 0) {
                        contenedorTalles.innerHTML = prod.sizes.map(s => `
                            <button class="size-btn" onclick="seleccionarTalle(this, '${s.size}')">
                                ${s.size}
                            </button>
                        `).join('');
                    } else {
                        contenedorTalles.innerHTML = '<p style="color: #ff4d4d;">Sin stock por el momento</p>';
                    }
                }
            } catch (e) { console.error(e); }
        };

        // Función para marcar visualmente el talle elegido
        function seleccionarTalle(elemento, talle) {
            // Quitar clase activa de todos
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active-size'));
            // Agregar al seleccionado
            elemento.classList.add('active-size');
            talleSeleccionado = talle;
        }

        function agregarAlCarrito() {
            if (!productoActual) return;
            
            if (!talleSeleccionado) {
                alert("Por favor, selecciona un talle antes de añadir al carrito.");
                return;
            }

            let carrito = JSON.parse(localStorage.getItem('urban_cart')) || [];
            
            carrito.push({
                id: productoActual.id,
                name: productoActual.name,
                price: productoActual.price,
                image: productoActual.image_url,
                size: talleSeleccionado, // Guardamos también el talle
                cantidad: 1
            });

            localStorage.setItem('urban_cart', JSON.stringify(carrito));
            window.location.href = '/carrito';
        }
    </script>
</body>
</html>
