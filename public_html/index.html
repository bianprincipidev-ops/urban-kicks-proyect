<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Kicks | Muy Pronto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial Black', Gadget, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            border: 2px solid #333;
            padding: 50px;
            position: relative;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 10px;
        }

        h1 span {
            color: #ff4d4d; /* El rojo Urban Kicks */
        }

        p {
            font-family: Arial, sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #888;
            margin-top: 20px;
        }

        .line {
            width: 100px;
            height: 5px;
            background-color: #ff4d4d;
            margin: 20px auto;
        }

        /* Un pequeño detalle decorativo */
        .bg-text {
            position: absolute;
            font-size: 15vw;
            opacity: 0.05;
            z-index: -1;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="bg-text">URBAN KICKS</div>

    <div class="container">
        <h1>URBAN<br><span>KICKS</span></h1>
        <div class="line"></div>
        <p>Próximamente</p>
    </div>

</body>
</html>
