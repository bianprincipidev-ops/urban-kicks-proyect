<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Estilos específicos para las filas de talles */
        .stock-container {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .size-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .size-input { flex: 2; padding: 8px; background: #f4f4f4; border: 1px solid #444; color: #333 !important; border-radius: 4px; }
        .stock-input { flex: 1; padding: 8px; background: #f4f4f4; border: 1px solid #444; color: #333 !important; border-radius: 4px; }
        .btn-size {
            padding: 0 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-add { background: #444; }
        .btn-remove { background: #ff4d4d; }

        /* Estilos para los botones de talle en la tabla */
        .admin-stock-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-width: 250px;
        }

        .btn-venta {
            background: #222;
            color: #eee;
            border: 1px solid #444;
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-venta:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
            color: white;
        }

        .btn-venta span {
            font-weight: bold;
            margin-left: 3px;
            color: #ff4d4d;
        }

        .btn-venta:hover span {
            color: white;
        }
    </style>
</head>
<body class="admin-body">

    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="logo-urban.png" alt="Urban Kicks" class="admin-logo">
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" onclick="mostrarSeccion('productos')">
                    <i class="ri-dashboard-line"></i> <span>Productos</span>
                </a>
                <a href="#" class="sidebar-link" onclick="mostrarSeccion('promos')">
                    <i class="ri-advertisement-line"></i> <span>Promociones</span>
                </a>
                <a href="#" class="sidebar-link" onclick="mostrarSeccion('talles')">
                    <i class="ri-ruler-line"></i> <span>Tablas de Talles</span>
                </a>
                <a href="/tienda" class="sidebar-link">
                    <i class="ri-store-line"></i> <span>Ver Tienda</span>
                </a>
                <a href="#" onclick="logoutAdmin()" class="sidebar-link" style="color: #ff4d4d; margin-top: 50px;">
                    <i class="ri-logout-box-line"></i> <span>Cerrar Sesión</span>
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h2>Panel de Control</h2>
                <div class="user-info">Administrador <i class="ri-user-settings-line" style="color: #ff4d4d;"></i></div>
            </header>

            <section id="sec-productos" class="admin-section">
                <div class="section-header">
                    <h3>Gestión de Productos</h3>
                    <button class="btn-nuevo" onclick="abrirModal('modalProducto')">+ Nuevo Producto</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Modelo</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-productos-admin"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-promos" class="admin-section" style="display:none;">
                <div class="section-header">
                    <h3>Promociones</h3>
                    <button class="btn-nuevo" onclick="abrirModal('modalPromo')">+ Nueva Promo</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Subtítulo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-promos-admin"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-talles" class="admin-section" style="display:none;">
                <div class="section-header">
                    <h3>Tablas de Talles</h3>
                </div>
                <div style="padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid #333; max-width: 500px;">
                    <form id="formTalles">
                        <label style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 6px;">Marca:</label>
                        <input 
                            type="text" 
                            id="marcaTalle" 
                            placeholder="Ej: Nike, Adidas, Jordan..." 
                            required
                            style="width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; margin-bottom: 12px;">
                        
                        <label style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 6px;">Imagen de la tabla:</label>
                        <input 
                            type="file" 
                            id="fileTalle" 
                            accept="image/*" 
                            required
                            style="width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; margin-bottom: 16px;">
                        
                        <button type="submit" class="btn-cargar">SUBIR / ACTUALIZAR TABLA</button>
                    </form>
                    <p id="msg-talles" style="margin-top: 10px;"></p>
                </div>
            </section>
        </main>
    </div>

    <div id="modalProducto" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal('modalProducto')">&times;</span>
            <h3>Cargar Zapatilla</h3>
            <form id="productForm">
                <input type="text" id="name" placeholder="Nombre (Ej: Jordan 4)" required>
                <textarea id="description" placeholder="Descripción" rows="2"></textarea>
                <input type="number" id="price" placeholder="Precio ($)" required>
                
                <div style="margin-bottom: 10px;">
                    <select id="category_id" required style="width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px;">
                        <option value="1">Urbano</option>
                        <option value="2">Hombre</option>
                        <option value="3">Mujer</option>
                    </select>
                </div>

                <input type="text" id="color" placeholder="Color">

                <div class="stock-container">
                    <label style="color: #888; font-size: 0.8rem; display: block; margin-bottom: 8px;">Talles y Stock:</label>
                    <div id="sizes-wrapper">
                        <div class="size-row">
                            <input type="text" class="size-input" placeholder="Talle (Ej: 40)" required>
                            <input type="number" class="stock-input" placeholder="Cant." required>
                            <button type="button" class="btn-size btn-add" onclick="agregarFilaTalle()">+</button>
                        </div>
                    </div>
                </div>

                <label style="color: #888; font-size: 0.8rem;">Imagen:</label>
                <input type="file" id="imagen" accept="image/*" required>
                <button type="submit" class="btn-cargar">PUBLICAR PRODUCTO</button>
            </form>
        </div>
    </div>

    <div id="modalPromo" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal('modalPromo')">&times;</span>
            <h3>Nueva Promoción</h3>
            <form id="form-promo">
                <input type="text" id="promo-title" placeholder="Título" required>
                <textarea id="promo-subtitle" placeholder="Subtítulo"></textarea>
                <input type="file" id="promo-image" accept="image/*" required>
                <button type="submit" class="btn-cargar">SUBIR PROMOCIÓN</button>
            </form>
        </div>
    </div>

    <script>
        // 1. SEGURIDAD
        (async function() {
            const token = localStorage.getItem('urban_token');
            if (!token) window.location.href = '/';
            try {
                const res = await fetch('/api/usuario/perfil', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok || data.role !== 'admin') window.location.href = '/';
            } catch { window.location.href = '/'; }
        })();

        // 2. NAVEGACIÓN
        function mostrarSeccion(seccion) {
            document.getElementById('sec-productos').style.display = seccion === 'productos' ? 'block' : 'none';
            document.getElementById('sec-promos').style.display = seccion === 'promos' ? 'block' : 'none';
            document.getElementById('sec-talles').style.display = seccion === 'talles' ? 'block' : 'none';
            document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
        }

        function abrirModal(id) { document.getElementById(id).style.display = "block"; }
        function cerrarModal(id) { document.getElementById(id).style.display = "none"; }

        // --- FUNCIÓN AGREGAR TALLES ---
        function agregarFilaTalle() {
            const wrapper = document.getElementById('sizes-wrapper');
            const div = document.createElement('div');
            div.className = 'size-row';
            div.innerHTML = `
                <input type="text" class="size-input" placeholder="Talle" required>
                <input type="number" class="stock-input" placeholder="Cant." required>
                <button type="button" class="btn-size btn-remove" onclick="this.parentElement.remove()">-</button>
            `;
            wrapper.appendChild(div);
        }

        // 3. CARGAR TABLAS
        async function cargarTablas() {
            try {
                const res = await fetch('/api/productos');
                const productos = await res.json();
                const tbody = document.getElementById('lista-productos-admin');
                if(tbody) {
                    tbody.innerHTML = productos.map(p => `
                        <tr>
                            <td><img src="${p.image_url}" width="50" style="border-radius:5px;"></td>
                            <td>
                                <strong>${p.name}</strong><br>
                                <small style="color: #888;">${p.color || ''}</small>
                            </td>
                            <td>$${p.price}</td>
                            <td>
                                <div class="admin-stock-controls">
                                    ${p.sizes && p.sizes.length > 0 
                                        ? p.sizes.map(s => `
                                            <button class="btn-venta" title="Click para descontar 1 unidad" onclick="confirmarVenta(${p.id}, '${s.size}', ${s.stock})">
                                                T${s.size} <span>(${s.stock})</span>
                                            </button>
                                        `).join('')
                                        : '<span style="color: #666; font-size: 0.8rem;">Sin talles</span>'
                                    }
                                </div>
                            </td>
                            <td>
                                <button class="btn-del" onclick="eliminarItem('/api/productos', ${p.id})">
                                    <i class="ri-delete-bin-line"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error(e); }

            try {
                const resPromo = await fetch('/api/promociones');
                const promos = await resPromo.json();
                const tbodyPromo = document.getElementById('lista-promos-admin');
                if(tbodyPromo) {
                    tbodyPromo.innerHTML = promos.map(p => `
                        <tr>
                            <td><strong>${p.title}</strong></td>
                            <td>${p.subtitle}</td>
                            <td><button class="btn-del" onclick="eliminarItem('/api/promociones', ${p.id})"><i class="ri-delete-bin-line"></i></button></td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }

        // SUBIR TABLA DE TALLES
        document.getElementById('formTalles').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg-talles');
            const formData = new FormData();
            formData.append('marca', document.getElementById('marcaTalle').value);
            formData.append('imagen_talle', document.getElementById('fileTalle').files[0]);

            const res = await fetch('/api/admin/talles', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` },
                body: formData
            });
            const data = await res.json();
            msg.innerHTML = data.success 
                ? `<span style="color:#28a745;">✅ ${data.message}</span>` 
                : `<span style="color:#dc3545;">❌ Error al subir</span>`;
        });

        // FUNCIÓN PARA CONFIRMAR VENTA Y ACTUALIZAR STOCK
        async function confirmarVenta(productId, talle, stockActual) {
            if (stockActual <= 0) {
                alert("Este talle ya no tiene stock disponible.");
                return;
            }

            if (confirm(`¿Confirmar venta del talle ${talle}? Se restará 1 unidad del stock.`)) {
                try {
                    const res = await fetch('/api/productos/confirmar-venta', {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('urban_token')}`
                        },
                        body: JSON.stringify({ product_id: productId, size: talle })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        alert("¡Venta confirmada! Stock actualizado.");
                        cargarTablas(); // Esto refresca la tabla para ver el nuevo stock
                    } else {
                        alert("Error: " + (data.error || "No se pudo actualizar el stock"));
                    }
                } catch (error) {
                    console.error("Error en la venta:", error);
                    alert("Error de conexión con el servidor.");
                }
            }
        }

        // 4. ELIMINAR
        async function eliminarItem(ruta, id) {
            if(confirm("¿Eliminar ítem?")) {
                try {
                    await fetch(`${ruta}/${id}`, { 
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` }
                    });
                    cargarTablas();
                } catch (e) { console.error(e); }
            }
        }

        // 5. ENVÍOS
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();

            // RECOLECTAR TALLES
            const rows = document.querySelectorAll('.size-row');
            let sizesData = [];
            rows.forEach(row => {
                const s = row.querySelector('.size-input').value;
                const q = row.querySelector('.stock-input').value;
                if(s && q) sizesData.push({ size: s, stock: q });
            });

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('color', document.getElementById('color').value);
            formData.append('image', document.getElementById('imagen').files[0]);
            formData.append('sizes', JSON.stringify(sizesData)); // Enviamos talles como JSON

            const res = await fetch('/api/productos', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` },
                body: formData
            });

            if(res.ok) { 
                alert("Producto cargado con éxito"); 
                cerrarModal('modalProducto'); 
                e.target.reset();
                // Resetear wrapper de talles
                document.getElementById('sizes-wrapper').innerHTML = `
                    <div class="size-row">
                        <input type="text" class="size-input" placeholder="Talle (Ej: 40)" required>
                        <input type="number" class="stock-input" placeholder="Cant." required>
                        <button type="button" class="btn-size btn-add" onclick="agregarFilaTalle()">+</button>
                    </div>`;
                cargarTablas(); 
            }
        };

        document.getElementById('form-promo').onsubmit = async (e) => {
            e.preventDefault();
            const data = new FormData();
            data.append('title', document.getElementById('promo-title').value);
            data.append('subtitle', document.getElementById('promo-subtitle').value);
            data.append('imagen', document.getElementById('promo-image').files[0]);

            const res = await fetch('/api/promociones/nuevo', { 
                method: 'POST', 
                headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` },
                body: data 
            });
            if(res.ok) { alert("Promo cargada"); cerrarModal('modalPromo'); e.target.reset(); cargarTablas(); }
        };

        function logoutAdmin() { localStorage.clear(); window.location.href = '/'; }
        window.onload = cargarTablas;
    </script>
</body>
</html>
