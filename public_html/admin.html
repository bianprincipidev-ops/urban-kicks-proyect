    <link rel="stylesheet" href="styles.css">

<body class="admin-body">

    <div class="admin-layout">

                <img src="logo-urban.png" alt="Urban Kicks Logo" class="admin-logo">
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" onclick="mostrarSeccion('productos')">
                    <i class="ri-dashboard-line"></i> <span>Productos</span>
                </a>
                <a href="#" class="sidebar-link" onclick="mostrarSeccion('promos')">
                    <i class="ri-advertisement-line"></i> <span>Promociones</span>
                </a>
                <a href="tienda.html" class="sidebar-link">
                    <i class="ri-store-line"></i> <span>Ver Tienda</span>
                </a>
                
                <a href="#" onclick="logoutAdmin()" class="sidebar-link" style="color: #ff4d4d; margin-top: 50px;">
                    <i class="ri-logout-box-line"></i> <span>Cerrar Sesión</span>
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h2>Panel de Control</h2>
                <div class="user-info">Administrador <i class="ri-user-settings-line" style="color: #ff4d4d;"></i></div>
            </header>

            <div id="modalProducto" class="modal">
                <div class="modal-content">
                    <span class="close" onclick="cerrarModal('modalProducto')">&times;</span>
                    <h3>Cargar Nueva Zapatilla</h3>
                    <form id="productForm">
                        <div class="form-grid">
                            <input type="text" id="name" placeholder="Modelo (Ej: Vans Old Skool)" required>
                            <input type="number" id="price" placeholder="Precio ($)" required>
                            
                            <select id="category_id" required>
                                <option value="" disabled selected>Seleccionar Categoría</option>
                                <option value="1">Urbano</option>
                                <option value="2">Hombre</option>
                                <option value="3">Mujer</option>
                            </select>
                            
                            <input type="text" id="color" placeholder="Color (Ej: Negro/Blanco)">
                        </div>

                        <textarea id="description" placeholder="Descripción detallada" rows="2"></textarea>

                        <div class="stock-container">
                            <label>Talles y Stock Disponible:</label>
                            <div id="sizes-wrapper">
                                <div class="size-row">
                                    <input type="text" class="size-input" placeholder="Talle (38)" required>
                                    <input type="number" class="stock-input" placeholder="Cant." required>
                                    <button type="button" class="btn-add-size" onclick="agregarFilaTalle()">+</button>
                                </div>
                            </div>
                        </div>

                        <label class="file-label">Imagen del producto:</label>
                        <input type="file" id="imagen" accept="image/*" required>
                        
                        <button type="submit" class="btn-cargar">PUBLICAR PRODUCTO</button>
                    </form>
                </div>
            </div>

            <section id="sec-promos" class="admin-section" style="display:none;">
                <div class="section-header">
                    <h3>Promociones</h3>
                    <button class="btn-nuevo" onclick="abrirModal('modalPromo')">+ Nueva Promo</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Subtítulo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-promos-admin">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modalProducto" class="modal">
        <div class="modal-content">
            <span class="close" style="color:white; float:right; cursor:pointer;" onclick="cerrarModal('modalProducto')">&times;</span>
            <h3>Cargar Zapatilla</h3>
            <form id="productForm">
                <input type="text" id="name" placeholder="Nombre (Ej: Jordan 4 Retro)" required>
                <textarea id="description" placeholder="Descripción detallada" rows="3"></textarea>
                <input type="number" id="price" placeholder="Precio ($)" required>
                
                <div style="margin-bottom: 15px;">

                    <select id="category_id" required style="width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px;">
                        <option value="1">Urbano</option>
                        <option value="2">Hombre</option>
                        <option value="3">Mujer</option>
                    </select>
                </div>

                <input type="text" id="color" placeholder="Color (Ej: Blanco/Negro)">

                <label style="color: #888; font-size: 0.8rem;">Imagen del producto:</label>
                <input type="file" id="imagen" accept="image/*" required>
                <button type="submit" class="btn-cargar">PUBLICAR PRODUCTO</button>
            </form>
        </div>
    </div>
    <div id="modalPromo" class="modal">
        <div class="modal-content">
            <span class="close" style="color:white; float:right; cursor:pointer;" onclick="cerrarModal('modalPromo')">&times;</span>
            <h3>Nueva Promoción</h3>
            <form id="form-promo">
                <input type="text" id="promo-title" placeholder="Título (Ej: Hot Sale)" required>
                <textarea id="promo-subtitle" placeholder="Subtítulo informativo"></textarea>
                <input type="file" id="promo-image" accept="image/*" required>
                <button type="submit" class="btn-cargar">SUBIR PROMOCIÓN</button>
            </form>
        </div>
    </div>

    <script>
    // 1. SEGURIDAD: Solo Admins
    (async function() {
        const token = localStorage.getItem('urban_token');
        if (!token) return window.location.href = 'index.html';

        try {
            const res = await fetch('/api/usuario/perfil', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (!res.ok || data.role !== 'admin') {
                window.location.href = 'index.html';
            }
        } catch {
            window.location.href = 'index.html';
        }
    })();

    // 2. NAVEGACIÓN Y MODALES
    function mostrarSeccion(seccion) {
        document.getElementById('sec-productos').style.display = seccion === 'productos' ? 'block' : 'none';
        document.getElementById('sec-promos').style.display = seccion === 'promos' ? 'block' : 'none';
        
        document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
    }

    function abrirModal(id) { document.getElementById(id).style.display = "block"; }
    function cerrarModal(id) { document.getElementById(id).style.display = "none"; }

    // --- FUNCIÓN PARA TALLES DINÁMICOS ---
    function agregarFilaTalle() {
        const wrapper = document.getElementById('sizes-wrapper');
        const div = document.createElement('div');
        div.className = 'size-row';
        div.style = "display: flex; gap: 10px; margin-bottom: 10px;";
        div.innerHTML = `
            <input type="text" class="size-input" placeholder="Talle" required style="flex:2;">
            <input type="number" class="stock-input" placeholder="Cant." required style="flex:1;">
            <button type="button" class="btn-remove-size" onclick="this.parentElement.remove()" style="background:#ff4d4d; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">-</button>
        `;
        wrapper.appendChild(div);
    }

    // 3. CARGAR PRODUCTOS Y PROMOS EN TABLAS
    async function cargarTablas() {
        try {
            const resProd = await fetch('/api/productos');
            const productos = await resProd.json();
            const tbodyProd = document.getElementById('lista-productos-admin');
            if (tbodyProd) {
                tbodyProd.innerHTML = productos.map(p => `
                    <tr>
                        <td><img src="${p.image_url}" width="50" style="border-radius:5px;"></td>
                        <td><strong>${p.name}</strong></td>
                        <td>$${p.price}</td>
                        <td>
                            <button class="btn-del" onclick="eliminarItem('/api/productos', ${p.id})">
                                <i class="ri-delete-bin-line"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (err) { console.error("Error productos:", err); }

        try {
            const resPromo = await fetch('/api/promociones');
            const promos = await resPromo.json();
            const tbodyPromo = document.getElementById('lista-promos-admin');
            if (tbodyPromo) {
                tbodyPromo.innerHTML = promos.map(p => `
                    <tr>
                        <td><strong>${p.title}</strong></td>
                        <td>${p.subtitle}</td>
                        <td>
                            <button class="btn-del" onclick="eliminarItem('/api/promociones', ${p.id})">
                                <i class="ri-delete-bin-line"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (err) { console.error("Error promos:", err); }
    }

    // 4. ELIMINAR ÍTEMS (Productos o Promos)
    async function eliminarItem(ruta, id) {
        if (!id) return alert("ID no encontrado");
        if(confirm("¿Estás seguro de eliminar este ítem?")) {
            try {
                const res = await fetch(`${ruta}/${id}`, { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` }
                });
                if(res.ok) { cargarTablas(); }
                else { alert("Error al eliminar"); }
            } catch (err) { console.error(err); }
        }
    }

    // 5. ENVÍO FORM PRODUCTO (Con Talles)
    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();

        // Recolectar talles de las filas dinámicas
        const rows = document.querySelectorAll('.size-row');
        let sizesData = [];
        rows.forEach(row => {
            const s = row.querySelector('.size-input').value;
            const q = row.querySelector('.stock-input').value;
            if(s && q) sizesData.push({ size: s, stock: q });
        });

        const formData = new FormData();
        formData.append('name', document.getElementById('name').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('price', document.getElementById('price').value);
        formData.append('category_id', document.getElementById('category_id').value);
        formData.append('color', document.getElementById('color').value);
        formData.append('image', document.getElementById('imagen').files[0]);
        formData.append('sizes', JSON.stringify(sizesData)); // Array a JSON string

        const res = await fetch('/api/productos', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` },
            body: formData
        });

        if (res.ok) {
            alert("Producto cargado con éxito");
            e.target.reset();
            // Resetear visualmente las filas de talles
            document.getElementById('sizes-wrapper').innerHTML = `
                <div class="size-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" class="size-input" placeholder="Talle (38)" required style="flex:2;">
                    <input type="number" class="stock-input" placeholder="Cant." required style="flex:1;">
                    <button type="button" class="btn-add-size" onclick="agregarFilaTalle()" style="background:#444; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">+</button>
                </div>`;
            cerrarModal('modalProducto');
            cargarTablas(); 
        } else {
            alert("Error al cargar producto");
        }
    };

    // 6. ENVÍO FORM PROMO
    document.getElementById('form-promo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData();
        data.append('title', document.getElementById('promo-title').value);
        data.append('subtitle', document.getElementById('promo-subtitle').value);
        data.append('imagen', document.getElementById('promo-image').files[0]);

        const res = await fetch('/api/promociones/nuevo', { 
            method: 'POST', 
            headers: { 'Authorization': `Bearer ${localStorage.getItem('urban_token')}` },
            body: data 
        });

        if(res.ok) { 
            alert("¡Promoción cargada!"); 
            cerrarModal('modalPromo');
            e.target.reset();
            cargarTablas(); 
        }
    });

    function logoutAdmin() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    window.onload = cargarTablas;
</script>
</body>
