<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-image">
            <div class="auth-image-content">
                <img src="logo-urban.png" alt="Urban Kicks">
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-box">
                <h2>Crear Cuenta</h2>
                <p>Sumate a la comunidad Urban Kicks</p>
                
                <form id="register-form">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" placeholder="Tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <button type="submit" class="btn-auth-editorial">Registrarme</button>
                    
                    <div class="auth-footer">
                        ¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Usamos window.onload para estar seguros de que el HTML cargó
        window.onload = () => {
            const form = document.getElementById('registroForm');

            form.onsubmit = async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validación simple de contraseñas
                if (password !== confirmPassword) {
                    return alert("Las contraseñas no coinciden");
                }

                try {
                    const res = await fetch('/api/registro', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    const data = await res.json();
                    
                    if (res.ok) {
                        alert("¡Cuenta creada! Ya podés iniciar sesión.");
                        window.location.href = 'login.html';
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (error) {
                    console.error("Error en la conexión:", error);
                    alert("No se pudo conectar con el servidor.");
                }
            };
        };
    </script>
</body>
</html>
