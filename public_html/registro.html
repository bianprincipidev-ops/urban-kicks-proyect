<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Urban Kicks</title>
    <meta name="description" content="Urban Kicks - Las mejores zapatillas urbanas en Río Cuarto. Nike, Adidas, Jordan, Vans y más.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="logo-urban.png" fetchpriority="high">
    <script src="main.js"></script>
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <div class="split-container">
            
            <div class="auth-image-side">
                <div class="auth-image-content">
                    <img src="logo-urban.png" alt="Urban Kicks" class="auth-logo-large">
                </div>
            </div>

            <div class="auth-form-side">
                <div class="auth-form-content">
                    
                    <div class="form-header">
                        <h2>CREAR CUENTA</h2>
                        <p>¡Bienvenido a Urban Kicks!</p>
                    </div>

                    <form id="registroForm">
                        <div class="input-group">
                            <label>NOMBRE</label>
                            <input type="text" id="name" placeholder="Tu nombre" required>
                        </div>
                        <div class="input-group">
                            <label>EMAIL</label>
                            <input type="email" id="email" placeholder="tu@email.com" required>
                        </div>
                        <div class="input-group">
                            <label>CONTRASEÑA</label>
                            <input type="password" id="password" placeholder="********" required>
                        </div>
                        <div class="input-group">
                            <label>CONFIRMAR CONTRASEÑA</label>
                            <input type="password" id="confirmPassword" placeholder="********" required>
                        </div>

                        <button type="submit" class="btn-entrar-split">CREAR CUENTA</button>
                        
                        <div class="auth-footer">
                            <a href="#" onclick="alert('Funcionalidad en desarrollo')" class="forgot-password">¿Olvidaste tu contraseña?</a>
                            <p>¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

<script>
    window.onload = () => {
        document.getElementById('registroForm').onsubmit = ejecutarRegistro;
    };
</script>
</body>
</html>
