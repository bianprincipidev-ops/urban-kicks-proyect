<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="logo-urban.png" fetchpriority="high">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <div class="split-container">
            
            <div class="auth-image-side">
                <div class="auth-image-content">
                    <img src="logo-urban.png" alt="Urban Kicks" class="auth-logo-large" loading="eager">
                </div>
            </div>

            <div class="auth-form-side">
                <div class="auth-form-content">
                    
                    <div class="form-header">
                        <h2>CREAR CUENTA</h2>
                        <p>¡Bienvenido a Urban Kicks!</p>
                    </div>

                    <form id="registroForm">
                        <div class="input-group">
                            <label>NOMBRE</label>
                            <input type="text" id="name" placeholder="Tu nombre" required>
                        </div>
                        <div class="input-group">
                            <label>EMAIL</label>
                            <input type="email" id="email" placeholder="tu@email.com" required>
                        </div>
                        <div class="input-group">
                            <label>CONTRASEÑA</label>
                            <input type="password" id="password" placeholder="********" required>
                        </div>
                        <div class="input-group">
                            <label>CONFIRMAR CONTRASEÑA</label>
                            <input type="password" id="confirmPassword" placeholder="********" required>
                        </div>

                        <button type="submit" class="btn-entrar-split">CREAR CUENTA</button>
                        
                        <div class="auth-footer">
                            <a href="#" onclick="alert('Funcionalidad en desarrollo')" class="forgot-password">¿Olvidaste tu contraseña?</a>
                            <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Usamos window.onload para estar seguros de que el HTML cargó
        window.onload = () => {
            const form = document.getElementById('registroForm');

            form.onsubmit = async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validación simple de contraseñas
                if (password !== confirmPassword) {
                    return alert("Las contraseñas no coinciden");
                }

                try {
                    const res = await fetch('/api/registro', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    const data = await res.json();
                    
                    if (res.ok) {
                        alert("¡Cuenta creada! Ya podés iniciar sesión.");
                        window.location.href = 'login.html';
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (error) {
                    console.error("Error en la conexión:", error);
                    alert("No se pudo conectar con el servidor.");
                }
            };
        };
    </script>
</body>
</html>
