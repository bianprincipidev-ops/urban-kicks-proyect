<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="logo-urban.png" fetchpriority="high">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <div class="split-container">
            
            <div class="auth-image-side">
                <div class="auth-image-content">
                    <img src="logo-urban.png" alt="Urban Kicks" class="auth-logo-large">
                </div>
            </div>

            <div class="auth-form-side">
                <div class="auth-form-content">
                    
                    <div class="form-header">
                        <h2>INICIAR SESIÓN</h2>
                        <p>¡Qué bueno verte de nuevo!</p>
                    </div>
                    
                    <form id="login-form">
                        <div class="input-group">
                            <label>EMAIL</label>
                            <input type="email" id="email" placeholder="tu@email.com" required>
                        </div>
                        <div class="input-group">
                            <label>CONTRASEÑA</label>
                            <input type="password" id="password" placeholder="********" required>
                        </div>
                        
                        <button type="submit" class="btn-entrar-split">ENTRAR</button>
                        
                        <div class="auth-footer">
                            <a href="javascript:void(0)" onclick="mostrarModalRecuperacion()" class="forgot-password">¿Olvidaste tu contraseña?</a>
                            <p>¿No tenés cuenta? <a href="registro.html">Crear cuenta</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="modalRecuperar" class="modal-recuperar">
        <div class="modal-content">
            <div id="paso1">
                <h2>Recuperar</h2>
                <p>Enviaremos un código a tu email.</p>
                <input type="email" id="emailRecuperar" placeholder="tu@email.com" class="modal-input">
                <button id="btnEnviarCodigo" onclick="enviarCodigo()" class="btn-modal">ENVIAR CÓDIGO</button>
            </div>

            <div id="paso2" style="display:none;">
                <h2>Verificar</h2>
                <p>Ingresa el código y tu nueva contraseña.</p>
                <input type="text" id="codigoVerificacion" placeholder="Código de 6 dígitos" class="modal-input">
                <input type="password" id="nuevaPassword" placeholder="Nueva Contraseña" class="modal-input">
                <button id="btnRestablecer" onclick="cambiarPassword()" class="btn-modal">RESTABLECER</button>
            </div>

            <button onclick="cerrarModal()" class="btn-cancelar">Volver al login</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DE LOGIN ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('urban_token', data.token);
                    localStorage.setItem('user_role', data.role);

                    if (data.role === 'admin') {
                        alert("¡Bienvenida, Admin de Urban Kicks!");
                        window.location.href = 'admin.html';
                    } else {
                        alert("¡Bienvenido!");
                        window.location.href = 'tienda.html';
                    }
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Error de conexión con el servidor.");
            }
        };

        // --- LÓGICA DEL MODAL DE RECUPERACIÓN ---
        function mostrarModalRecuperacion() {
            document.getElementById('modalRecuperar').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('modalRecuperar').style.display = 'none';
        }

        async function enviarCodigo() {
            const email = document.getElementById('emailRecuperar').value;
            if(!email) return alert("Ingresa tu email.");

            try {
                const res = await fetch('/api/usuario/recuperar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                if(data.success) {
                    alert("¡Código enviado!");
                    document.getElementById('paso1').style.display = 'none';
                    document.getElementById('paso2').style.display = 'block';
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Error de conexión.");
            }
        }

        async function cambiarPassword() {
            const email = document.getElementById('emailRecuperar').value;
            const codigo = document.getElementById('codigoVerificacion').value;
            const nuevaPassword = document.getElementById('nuevaPassword').value;

            if(!codigo || !nuevaPassword) return alert("Completa todos los campos.");

            try {
                const res = await fetch('/api/usuario/restablecer-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, codigo, nuevaPassword })
                });

                const data = await res.json();
                if(data.success) {
                    alert("¡Contraseña actualizada!");
                    location.reload();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Error de conexión.");
            }
        }
    </script>
</body>
</html>
