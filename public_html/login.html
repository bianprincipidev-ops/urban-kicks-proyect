<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-box">
            <h2>Iniciar<br>Sesión</h2> <p>¡Qué bueno verte de nuevo!</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                
                <button type="submit" class="btn-auth-editorial">Entrar</button>
                
                <div class="auth-footer">
                    ¿No tenés cuenta? <a href="registro.html">Crear cuenta</a> <br><br>
                    <a href="#" onclick="alert('Funcionalidad en desarrollo')" style="font-weight: 400; text-transform: none; text-decoration: none; color: #666; font-size: 0.75rem;">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- LÓGICA DE LOGIN ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('urban_token', data.token);
                    localStorage.setItem('user_role', data.role);

                    if (data.role === 'admin') {
                        alert("¡Bienvenida, Admin de Urban Kicks!");
                        window.location.href = 'admin.html';
                    } else {
                        alert("¡Bienvenido!");
                        window.location.href = 'tienda.html';
                    }
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Error de conexión con el servidor.");
            }
        };
    </script>
</body>
</html>
