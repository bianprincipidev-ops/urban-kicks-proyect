<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito | Urban Kicks</title>
    <meta name="description" content="Urban Kicks - Las mejores zapatillas urbanas en Río Cuarto. Nike, Adidas, Jordan, Vans y más.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="main.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="/tienda"><img src="logo-urban.png" alt="Urban Kicks Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="javascript:void(0)" onclick="cargarProductos('1')">Urbano</a>
            <a href="javascript:void(0)" onclick="cargarProductos('2')">Hombre</a>
            <a href="javascript:void(0)" onclick="cargarProductos('3')">Mujer</a>
            <a href="javascript:void(0)" onclick="abrirModalTalles()">Tabla de Talles</a>
        </nav>
        <div class="header-icons">
            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar modo">
                <i id="theme-icon" class="ri-moon-line"></i>
            </button>
            <a href="/login" id="user-link" title="Mi Cuenta"><i class="ri-user-line"></i></a>
            <a href="/carrito"><i class="ri-shopping-cart-line"></i></a>
            <button id="btn-logout" onclick="logout()" title="Cerrar Sesión" style="display: none; background: none; border: none; cursor: pointer; padding: 0;">
                <i class="ri-logout-box-r-line" style="font-size: 1.5rem; color: #ff4d4d;"></i>
            </button>
        </div>
    </header>

    <div id="modalTalles" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close" onclick="cerrarModalTalles()">&times;</span>
            <h3>Tabla de Talles</h3>
            <div style="margin-bottom: 12px;">
                <select id="selectMarcaTalle" onchange="cargarTablaTalle()" style="width:100%; padding:10px; background:#222; color:white; border:1px solid #444; border-radius:5px;">
                    <option value="">-- Seleccioná una marca --</option>
                </select>
            </div>
            <div id="contenedor-tabla-talle" style="text-align:center; color:#888;">
                Seleccioná una marca para ver su tabla.
            </div>
        </div>
    </div>

    <main class="cart-container">
        <h1>Tu Carrito</h1>
        <div id="cart-items">
            </div>

        <div class="cart-summary">
            <div class="summary-details">
                <p>Subtotal: <span id="cart-subtotal">$0</span></p>
                <p>Envío: <span style="color: #25D366;">¡GRATIS! (Río Cuarto)</span></p>
                <hr>
                <h3>Total: <span id="cart-total">$0</span></h3>
            </div>
            <div class="cart-buttons">
                <button class="btn-checkout" onclick="finalizarCompra()">
                    <i class="ri-whatsapp-line"></i> FINALIZAR POR WHATSAPP
                </button>
                <button class="btn-continue" onclick="window.location.href='/tienda'">
                    <i class="ri-arrow-left-line"></i> SEGUIR COMPRANDO
                </button>
            </div>
        </div>
    </main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderizarCarrito();
    });

    function renderizarCarrito() {
        const lista = JSON.parse(localStorage.getItem('urban_cart')) || [];
        const contenedor = document.getElementById('cart-items');
        let total = 0;

        if (lista.length === 0) {
            contenedor.innerHTML = `
                <div style="text-align:center; padding: 50px;">
                    <i class="ri-shopping-cart-2-line" style="font-size: 4rem; color: #ccc;"></i>
                    <p style="margin-top: 15px; color: #888;">Tu carrito está vacío</p>
                </div>`;
            document.getElementById('cart-total').innerText = "$0";
            document.getElementById('cart-subtotal').innerText = "$0";
            return;
        }

        contenedor.innerHTML = "";
        lista.forEach((item, index) => {
            const cantidad = item.cantidad || 1;
            const subtotalItem = item.price * cantidad;
            total += subtotalItem;

            contenedor.innerHTML += `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>Talle: <strong>${item.size}</strong></p>
                        
                        <div style="display: flex; align-items: center; gap: 10px; margin: 8px 0;">
                            <button onclick="actualizarCantidad(${index}, -1)" class="qty-btn-small">−</button>
                            <span style="font-weight: bold;">${cantidad}</span>
                            <button onclick="actualizarCantidad(${index}, 1)" class="qty-btn-small">+</button>
                        </div>

                        <span class="cart-item-price">$${Number(item.price).toLocaleString('es-AR')} c/u</span>
                    </div>
                    <button class="btn-remove" onclick="eliminarDelCarrito(${index})" title="Eliminar">
                        <i class="ri-delete-bin-line"></i>
                    </button>
                </div>`;
        });

        const totalFormateado = `$${total.toLocaleString('es-AR')}`;
        document.getElementById('cart-total').innerText = totalFormateado;
        document.getElementById('cart-subtotal').innerText = totalFormateado;
    }

    // NUEVA FUNCIÓN: Para sumar o restar desde el carrito
    function actualizarCantidad(index, delta) {
        let carrito = JSON.parse(localStorage.getItem('urban_cart')) || [];
        let nuevaCant = (carrito[index].cantidad || 1) + delta;

        if (nuevaCant < 1) {
            eliminarDelCarrito(index);
        } else {
            carrito[index].cantidad = nuevaCant;
            localStorage.setItem('urban_cart', JSON.stringify(carrito));
            renderizarCarrito();
        }
    }

    function eliminarDelCarrito(index) {
        if(confirm("¿Quitar este producto del carrito?")) {
            let carrito = JSON.parse(localStorage.getItem('urban_cart')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('urban_cart', JSON.stringify(carrito));
            renderizarCarrito();
        }
    }

    function finalizarCompra() {
        const carrito = JSON.parse(localStorage.getItem('urban_cart')) || [];
        if (carrito.length === 0) return alert("El carrito está vacío");

        let mensaje = "¡Hola Urban Kicks! 🔥 Quisiera realizar el siguiente pedido:\n\n";
        let total = 0;

        carrito.forEach(i => {
            const cant = i.cantidad || 1;
            const sub = i.price * cant;
            mensaje += `▪️ *${i.name}*\n`;
            mensaje += `   Talle: ${i.size} | Cant: ${cant}\n`;
            mensaje += `   Subtotal: $${sub.toLocaleString('es-AR')}\n\n`;
            total += sub;
        });

        mensaje += `*TOTAL A PAGAR: $${total.toLocaleString('es-AR')}*`;
        mensaje += `\n\n_Envío a coordinar en Río Cuarto_ 👟`;

        const url = `https://wa.me/5493585756996?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
