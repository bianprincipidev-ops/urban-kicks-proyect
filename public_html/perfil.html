<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Urban Kicks</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Estilos adicionales para la foto y seguridad */
        .avatar-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--urban-red);
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .edit-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #ff4d4d;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            border: 2px solid #000;
        }
        .seguridad-seccion {
            grid-column: span 2;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #ddd;
        }
        .seguridad-seccion h3 {
            font-size: 0.9rem;
            color: #ff4d4d;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="tienda.html">
                <img src="logo-urban.png" alt="Urban Kicks Logo">
            </a>
        </div>
        <div class="header-icons">
            <a href="tienda.html" title="Volver a la tienda"><i class="ri-store-2-line"></i></a>
            <i class="ri-moon-line" title="Cambiar modo"></i>
            <a href="carrito.html"><i class="ri-shopping-cart-line"></i></a>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="user-avatar-side">
                <div class="avatar-wrapper" onclick="document.getElementById('fileInput').click()">
                    <div class="avatar-circle" id="user-initial">U</div>
                    <div class="edit-overlay"><i class="ri-camera-line"></i></div>
                </div>
                <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="previewFoto(this)">
                
                <div class="sidebar-header">
                    <h3 id="display-username">Cargando...</h3>
                    <p>Cliente VIP</p>
                </div>
            </div>
            
            <nav>
                <a href="#" class="sidebar-link active">
                    <i class="ri-user-settings-line"></i> <span>Mi Perfil</span>
                </a>
                <a href="#pedidos" class="sidebar-link">
                    <i class="ri-shopping-bag-line"></i> <span>Mis Pedidos</span>
                </a>
                <a href="tienda.html" class="sidebar-link">
                    <i class="ri-arrow-left-line"></i> <span>Volver a Tienda</span>
                </a>
            </nav>

            <a href="#" onclick="logout()" class="sidebar-link" style="margin-top: auto; border-top: 1px solid #222; color: #ff4d4d;">
                <i class="ri-logout-box-r-line"></i> <span>Cerrar Sesión</span>
            </a>
        </aside>

        <main class="main-content">
            <section class="section-card">
                <h2><i class="ri-settings-3-line"></i> Configuración de la Cuenta</h2>
                
                <form id="formPerfil" class="perfil-form-grid">
                    
                    <div class="seguridad-seccion">
                        <h3><i class="ri-user-line"></i> Información Personal</h3>
                    </div>
                    
                    <div class="form-group-grande">
                        <label>Nombre y Apellido</label>
                        <input type="text" id="full_name" placeholder="Ej: Bianca Principi">
                    </div>
        
                    <div class="form-group-grande">
                        <label>DNI / CUIL</label>
                        <input type="text" id="dni" placeholder="Sin puntos ni espacios">
                    </div>
        
                    <div class="form-group-grande">
                        <label>Nombre de Usuario</label>
                        <input type="text" id="username" placeholder="Tu apodo">
                    </div>
        
                    <div class="form-group-grande">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="tu@email.com">
                    </div>
        
                    <div class="form-group-grande">
                        <label>Teléfono de contacto</label>
                        <input type="text" id="phone" placeholder="+54 358...">
                    </div>
        
                    <div class="seguridad-seccion">
                        <h3><i class="ri-map-pin-line"></i> Datos de Envío</h3>
                    </div>
        
                    <div class="form-group-grande full-width">
                        <label>Calle y Número</label>
                        <input type="text" id="address" placeholder="Ej: Calle Laprida 985">
                    </div>
        
                    <div class="form-group-spec" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; grid-column: span 2;">
                        <div class="form-group-grande">
                            <label>C. Postal</label>
                            <input type="text" id="postal_code" placeholder="5808">
                        </div>
                        <div class="form-group-grande">
                            <label>Ciudad</label>
                            <input type="text" id="city" placeholder="Río Cuarto">
                        </div>
                        <div class="form-group-grande">
                            <label>Provincia</label>
                            <input type="text" id="province" placeholder="Córdoba">
                        </div>
                    </div>
        
                    <div class="seguridad-seccion">
                        <h3><i class="ri-lock-password-line"></i> Seguridad</h3>
                    </div>
        
                    <div class="form-group-grande">
                        <label>Nueva Contraseña</label>
                        <input type="password" id="new_password" placeholder="Dejar en blanco para mantener actual">
                    </div>
        
                    <div class="form-group-grande full-width" style="display: flex; justify-content: flex-end; margin-top: 20px;">
                        <button type="submit" class="btn-guardar-grande">Guardar Todos los Cambios</button>
                    </div>
                </form>
                <div id="mensaje"></div>
            </section>
        
            <section class="section-card" id="pedidos">
                <h2><i class="ri-history-line"></i> Historial de Compras</h2>
                <div class="table-container">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Pedido ID</th>
                                <th>Fecha</th>
                                <th>Producto</th>
                                <th>Total</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="lista-pedidos">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('urban_token');
        let imagenOptimizada = null; // Almacena la imagen comprimida para evitar errores 403
    
        // --- 1. MODO OSCURO ---
        function aplicarTema() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.querySelector('.header-icons i:nth-child(2)'); 
            if (icon) icon.className = savedTheme === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
        }
    
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            aplicarTema();
        }
    
        document.addEventListener('DOMContentLoaded', () => {
            aplicarTema();
            const themeIcon = document.querySelector('.header-icons i:nth-child(2)');
            if (themeIcon) themeIcon.onclick = toggleTheme;
        });
    
        // --- 2. CARGAR PERFIL COMPLETO ---
        async function inicializarDashboard() {
            if (!token) {
                window.location.href = 'index.html';
                return;
            }
            try {
                const resUser = await fetch(`/api/usuario/perfil?t=${Date.now()}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (resUser.ok) {
                    const user = await resUser.json();
                    
                    // Mapeo de datos a los inputs del nuevo formulario
                    document.getElementById('full_name').value = user.full_name || '';
                    document.getElementById('dni').value = user.dni || '';
                    document.getElementById('username').value = user.username || '';
                    document.getElementById('email').value = user.email || '';
                    document.getElementById('phone').value = user.phone || '';
                    document.getElementById('address').value = user.address || '';
                    document.getElementById('postal_code').value = user.postal_code || '';
                    document.getElementById('city').value = user.city || '';
                    document.getElementById('province').value = user.province || '';
                    
                    // Actualizar Sidebar
                    const nombreAMostrar = user.full_name || user.username || "Usuario";
                    document.getElementById('display-username').innerText = nombreAMostrar.toUpperCase();
                    
                    // Cargar Foto desde DB
                    const avatarContenedor = document.getElementById('user-initial');
                    if (user.avatar_url && user.avatar_url !== "null") {
                        avatarContenedor.innerHTML = `<img src="${user.avatar_url}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                    } else {
                        avatarContenedor.innerText = nombreAMostrar.charAt(0).toUpperCase();
                    }
                }
            } catch (err) { 
                console.error("Error al cargar perfil:", err); 
            }
            cargarPedidosSimulados();
        }
    
        // --- 3. PREVISUALIZAR Y COMPRIMIR FOTO (Evita Error 403) ---
        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        // Tamaño estándar para avatares
                        canvas.width = 150;
                        canvas.height = 150;
                        ctx.drawImage(img, 0, 0, 150, 150);
                        
                        // Comprimimos para que el string Base64 no sea gigante
                        imagenOptimizada = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('user-initial').innerHTML = `<img src="${imagenOptimizada}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                    };
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    
        // --- 4. ACTUALIZAR TODOS LOS DATOS ---
        document.getElementById('formPerfil').addEventListener('submit', async (e) => {
                e.preventDefault(); // Detiene el envío tradicional del formulario
                
                const msg = document.getElementById('mensaje');
                const btn = e.target.querySelector('button'); // El botón de guardar
                
                // Bloqueamos el botón para evitar doble clic
                btn.disabled = true;
                btn.innerText = "Guardando...";
                msg.innerHTML = ""; 
            
                const updatedData = {
                    full_name: document.getElementById('full_name').value.trim(),
                    dni: document.getElementById('dni').value.trim(),
                    username: document.getElementById('username').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    address: document.getElementById('address').value.trim(),
                    postal_code: document.getElementById('postal_code').value.trim(),
                    city: document.getElementById('city').value.trim(),
                    province: document.getElementById('province').value.trim(),
                    password: document.getElementById('new_password').value // No usamos trim aquí por seguridad
                };
            
                // Solo enviamos avatar_url si realmente se seleccionó una imagen nueva
                if (imagenOptimizada) {
                    updatedData.avatar_url = imagenOptimizada;
                }
            
                try {
                    const res = await fetch('/api/usuario/actualizar', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(updatedData)
                    });
            
                    const result = await res.json();
            
                    if (result.success) {
                        msg.innerHTML = `<p style="color: #28a745; font-weight: bold; margin-top: 10px;">✅ ¡Cambios guardados con éxito!</p>`;
                        
                        // En lugar de reload(), actualizamos el nombre en el sidebar manualmente
                        const nuevoNombre = updatedData.full_name || updatedData.username;
                        if(document.getElementById('display-username')) {
                            document.getElementById('display-username').innerText = nuevoNombre.toUpperCase();
                        }
            
                        // Limpiamos el campo de contraseña por seguridad
                        document.getElementById('new_password').value = "";
                        
                    } else {
                        msg.innerHTML = `<p style="color: #dc3545; font-weight: bold; margin-top: 10px;">❌ Error: ${result.message || 'Error al actualizar'}</p>`;
                    }
                } catch (error) {
                    console.error("Error en Fetch:", error);
                    msg.innerHTML = `<p style="color: #dc3545; font-weight: bold; margin-top: 10px;">❌ Error de conexión: El servidor no respondió.</p>`;
                } finally {
                    // Re-habilitamos el botón pase lo que pase
                    btn.disabled = false;
                    btn.innerText = "Guardar Todos los Cambios";
                }
            });
    
        // --- 5. PEDIDOS Y LOGOUT ---
        function cargarPedidosSimulados() {
            const lista = document.getElementById('lista-pedidos');
            const pedidos = [
                { id: '#UK-7721', fecha: '14/04/2026', producto: 'Jordan 4 Retro Black', total: '$420.000', estado: 'Enviado' }
            ];
            lista.innerHTML = pedidos.map(p => `
                <tr>
                    <td><strong>${p.id}</strong></td>
                    <td>${p.fecha}</td>
                    <td>${p.producto}</td>
                    <td>${p.total}</td>
                    <td><span class="status-pill shipped">${p.estado}</span></td>
                </tr>`).join('');
        }
    
        function logout() {
            if(confirm("¿Cerrar sesión?")) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    
        // Inicialización al cargar la página
        inicializarDashboard();
    </script>
</body>
</html>
